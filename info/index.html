<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Madis' Birthday Party — Info</title>
<style>
@font-face {
  font-family:'PixeloidSans';
  src:url('../fonts/PixeloidSans-lxa3y.ttf') format('truetype');
  font-weight:400; font-style:normal;
}
@font-face {
  font-family:'PixeloidSans';
  src:url('../fonts/PixeloidSansBold-1jpBg.ttf') format('truetype');
  font-weight:700; font-style:normal;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  min-height:100%;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 16px;
  font-family:'PixeloidSans', monospace;
}

#card {
  background:#0a0a2a;
  color:#fff;
  width:min(420px, 100%);
  text-align:center;
  border:4px solid #fff;
  box-shadow:0 0 0 4px #000, 0 0 0 8px #555;
  padding:28px 24px 24px;
  position:relative;
  animation:pixIn .18s steps(4) both;
}

@keyframes pixIn {
  from { transform:scale(0); opacity:0; }
  to   { transform:scale(1); opacity:1; }
}

.lang-toggle {
  position:absolute;
  top:10px; right:10px;
  font-family:'PixeloidSans', monospace;
  font-size:8px;
  background:#1a1a3a;
  border:2px solid #555;
  color:#aaa;
  padding:5px 8px;
  cursor:pointer;
  letter-spacing:0.05em;
}
.lang-toggle:hover { color:#fff; border-color:#f8c000; }

#card.lang-en .pt { display:none; }
#card.lang-pt .en { display:none; }

.c-header {
  font-weight:700;
  font-size:18px;
  color:#f8c000;
  line-height:1.5;
  border-bottom:3px solid #f8c000;
  padding-bottom:14px;
  margin-bottom:18px;
  letter-spacing:0.04em;
}

.c-grid {
  display:grid;
  grid-template-columns:auto 1fr;
  gap:8px 14px;
  text-align:left;
  margin-bottom:20px;
}

.c-lbl {
  color:#74d4f8;
  font-size:14px;
  white-space:nowrap;
  line-height:1.65;
}

.c-val {
  color:#fff;
  font-size:14px;
  line-height:1.65;
}

.px-btn {
  display:block;
  width:100%;
  padding:13px 10px;
  font-family:'PixeloidSans', sans-serif;
  font-size:15px;
  color:#fff;
  text-decoration:none;
  cursor:pointer;
  border:3px solid #000;
  outline:none;
  text-transform:uppercase;
  letter-spacing:0.04em;
}
.btn-map { background:#003c7a; box-shadow:inset -4px -4px 0 #001840, inset 4px 4px 0 #0060c0; }
.btn-map:active { background:#002a60; }

@media (max-width:360px) {
  .c-header { font-size:15px; }
  .c-lbl, .c-val { font-size:13px; }
  .px-btn { font-size:13px; }
}
</style>
</head>
<body>

<div id="card" class="lang-en">

  <button class="lang-toggle" onclick="toggleLang()">PT</button>

  <div class="c-header">
    <span class="en">MADIS TURNS 8!</span>
    <span class="pt">MADIS FAZ 8 ANOS!</span>
  </div>

  <div class="c-grid">
    <span class="c-lbl en">DATE &raquo;</span>
    <span class="c-lbl pt">DATA &raquo;</span>
    <span class="c-val en">SAT 27 JUNE 2026</span>
    <span class="c-val pt">SÁB 27 JUNHO 2026</span>

    <span class="c-lbl en">TIME &raquo;</span>
    <span class="c-lbl pt">HORA &raquo;</span>
    <span class="c-val">16:00 &ndash; 20:00</span>

    <span class="c-lbl en">WHERE &raquo;</span>
    <span class="c-lbl pt">LOCAL &raquo;</span>
    <span class="c-val">Praia Fluvial de Felinhos,<br>Lago, Portugal</span>
  </div>

  <a class="px-btn btn-map" href="https://maps.app.goo.gl/tUTTnRjmzyCPgLY69" target="_blank" rel="noopener">
    <span class="en">[ OPEN MAP ]</span>
    <span class="pt">[ VER MAPA ]</span>
  </a>

</div>

<script>
function toggleLang() {
  const card = document.getElementById('card');
  const btn  = document.querySelector('.lang-toggle');
  const isEn = card.classList.contains('lang-en');
  card.classList.toggle('lang-en', !isEn);
  card.classList.toggle('lang-pt',  isEn);
  btn.textContent = isEn ? 'EN' : 'PT';
}
</script>
</body>
</html>
